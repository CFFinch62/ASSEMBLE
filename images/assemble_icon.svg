<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1a12"/>
      <stop offset="100%" stop-color="#080f09"/>
    </radialGradient>

    <!-- Wall body gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3d2e"/>
      <stop offset="50%" stop-color="#1e2e20"/>
      <stop offset="100%" stop-color="#141f15"/>
    </linearGradient>

    <!-- Border column gradient -->
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a6e4f"/>
      <stop offset="50%" stop-color="#5a8060"/>
      <stop offset="100%" stop-color="#3d5c42"/>
    </linearGradient>

    <!-- A glow -->
    <radialGradient id="aGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#b8e0b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a8050" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner wall glow behind A -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ab87e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e2e20" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for punctuation -->
    <filter id="punctGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- A glow filter -->
    <filter id="aTextGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wall outer glow -->
    <filter id="wallGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Column glow filter -->
    <filter id="colGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="40"/>

  <!-- Wall body -->
  <rect x="58" y="68" width="284" height="264" rx="4"
        fill="url(#wallGrad)" stroke="#4a6e4f" stroke-width="2"
        filter="url(#wallGlow)"/>

  <!-- Inner glow behind A -->
  <ellipse cx="200" cy="200" rx="80" ry="75" fill="url(#innerGlow)"/>

  <!-- LEFT COLUMN - alternating [ and { characters stacked -->
  <g font-family="monospace" font-size="15" font-weight="bold" filter="url(#colGlow)">
    <!-- [ { [ { alternating down left side -->
    <text x="62" y="94"  fill="#7ab87e" opacity="0.9">[</text>
    <text x="62" y="116" fill="#5a9060" opacity="0.85">{</text>
    <text x="62" y="138" fill="#7ab87e" opacity="0.9">[</text>
    <text x="62" y="160" fill="#5a9060" opacity="0.8">{</text>
    <text x="62" y="182" fill="#7ab87e" opacity="0.85">[</text>
    <text x="62" y="204" fill="#5a9060" opacity="0.9">{</text>
    <text x="62" y="226" fill="#7ab87e" opacity="0.85">[</text>
    <text x="62" y="248" fill="#5a9060" opacity="0.8">{</text>
    <text x="62" y="270" fill="#7ab87e" opacity="0.9">[</text>
    <text x="62" y="292" fill="#5a9060" opacity="0.85">{</text>
    <text x="62" y="314" fill="#7ab87e" opacity="0.9">[</text>
    <text x="62" y="325" fill="#5a9060" opacity="0.8">{</text>

    <!-- Second left column offset -->
    <text x="76" y="94"  fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="116" fill="#7ab87e" opacity="0.65">[</text>
    <text x="76" y="138" fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="160" fill="#7ab87e" opacity="0.65">[</text>
    <text x="76" y="182" fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="204" fill="#7ab87e" opacity="0.65">[</text>
    <text x="76" y="226" fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="248" fill="#7ab87e" opacity="0.65">[</text>
    <text x="76" y="270" fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="292" fill="#7ab87e" opacity="0.65">[</text>
    <text x="76" y="314" fill="#5a9060" opacity="0.7">{</text>
    <text x="76" y="325" fill="#7ab87e" opacity="0.65">[</text>
  </g>

  <!-- RIGHT COLUMN - alternating ] and } characters stacked -->
  <g font-family="monospace" font-size="15" font-weight="bold" filter="url(#colGlow)">
    <!-- Second right column (inner) -->
    <text x="318" y="94"  fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="116" fill="#7ab87e" opacity="0.65">]</text>
    <text x="318" y="138" fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="160" fill="#7ab87e" opacity="0.65">]</text>
    <text x="318" y="182" fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="204" fill="#7ab87e" opacity="0.65">]</text>
    <text x="318" y="226" fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="248" fill="#7ab87e" opacity="0.65">]</text>
    <text x="318" y="270" fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="292" fill="#7ab87e" opacity="0.65">]</text>
    <text x="318" y="314" fill="#5a9060" opacity="0.7">}</text>
    <text x="318" y="325" fill="#7ab87e" opacity="0.65">]</text>

    <!-- Outer right column -->
    <text x="332" y="94"  fill="#7ab87e" opacity="0.9">]</text>
    <text x="332" y="116" fill="#5a9060" opacity="0.85">}</text>
    <text x="332" y="138" fill="#7ab87e" opacity="0.9">]</text>
    <text x="332" y="160" fill="#5a9060" opacity="0.8">}</text>
    <text x="332" y="182" fill="#7ab87e" opacity="0.85">]</text>
    <text x="332" y="204" fill="#5a9060" opacity="0.9">}</text>
    <text x="332" y="226" fill="#7ab87e" opacity="0.85">]</text>
    <text x="332" y="248" fill="#5a9060" opacity="0.8">}</text>
    <text x="332" y="270" fill="#7ab87e" opacity="0.9">]</text>
    <text x="332" y="292" fill="#5a9060" opacity="0.85">}</text>
    <text x="332" y="314" fill="#7ab87e" opacity="0.9">]</text>
    <text x="332" y="325" fill="#5a9060" opacity="0.8">}</text>
  </g>

  <!-- BRICK ROWS - alternating :: and = patterns, staggered like real brickwork -->
  <!-- Row 1 - :: pattern (offset 0) -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.75">
    <text x="94" y="88">:: = :: = :: = :: = :: = :: = ::</text>
  </g>
  <!-- Row 2 - = pattern (offset, staggered) -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.65">
    <text x="102" y="104">= :: = :: = :: = :: = :: = :: =</text>
  </g>
  <!-- Row 3 -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.72">
    <text x="94" y="120">:: = :: = :: = :: = :: = :: = ::</text>
  </g>
  <!-- Row 4 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.65">
    <text x="102" y="136">= :: = :: = :: = :: = :: = :: =</text>
  </g>
  <!-- Row 5 - starts fading toward center -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.68">
    <text x="94" y="152">:: = :: = ::               :: = ::</text>
  </g>
  <!-- Row 6 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.6">
    <text x="102" y="168">= :: = ::                       = ::</text>
  </g>
  <!-- Row 7 - center rows, gap for A -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.6">
    <text x="94" y="184">:: = ::                               ::</text>
  </g>
  <!-- Row 8 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.55">
    <text x="102" y="200">= ::                                   ::</text>
  </g>
  <!-- Row 9 -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.6">
    <text x="94" y="216">:: =                                 = ::</text>
  </g>
  <!-- Row 10 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.62">
    <text x="102" y="232">= :: =                           = :: =</text>
  </g>
  <!-- Row 11 - filling back in below center -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.68">
    <text x="94" y="248">:: = :: =                   = :: = ::</text>
  </g>
  <!-- Row 12 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.65">
    <text x="102" y="264">= :: = :: = :: = :: = :: = :: =</text>
  </g>
  <!-- Row 13 -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.72">
    <text x="94" y="280">:: = :: = :: = :: = :: = :: = ::</text>
  </g>
  <!-- Row 14 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.68">
    <text x="102" y="296">= :: = :: = :: = :: = :: = :: =</text>
  </g>
  <!-- Row 15 -->
  <g font-family="monospace" font-size="12" fill="#5a8060" filter="url(#punctGlow)" opacity="0.72">
    <text x="94" y="312">:: = :: = :: = :: = :: = :: = ::</text>
  </g>
  <!-- Row 16 -->
  <g font-family="monospace" font-size="12" fill="#4a7050" filter="url(#punctGlow)" opacity="0.65">
    <text x="102" y="326">= :: = :: = :: = :: = :: = :: =</text>
  </g>

  <!-- Horizontal mortar lines - subtle dividers between brick rows -->
  <g stroke="#3a5540" stroke-width="0.5" opacity="0.3">
    <line x1="90" y1="93"  x2="310" y2="93"/>
    <line x1="90" y1="109" x2="310" y2="109"/>
    <line x1="90" y1="125" x2="310" y2="125"/>
    <line x1="90" y1="141" x2="310" y2="141"/>
    <line x1="90" y1="253" x2="310" y2="253"/>
    <line x1="90" y1="269" x2="310" y2="269"/>
    <line x1="90" y1="285" x2="310" y2="285"/>
    <line x1="90" y1="301" x2="310" y2="301"/>
    <line x1="90" y1="317" x2="310" y2="317"/>
  </g>

  <!-- Glow circle behind A -->
  <circle cx="200" cy="200" r="55" fill="url(#aGlow)" opacity="0.2"/>
  <circle cx="200" cy="200" r="40" fill="#0e1a12" opacity="0.88"/>
  <circle cx="200" cy="200" r="38" fill="none" stroke="#7ab87e" stroke-width="1.5" opacity="0.5"/>

  <!-- The A - centered glowing -->
  <text x="200" y="220"
        font-family="Georgia, serif"
        font-size="68"
        font-weight="bold"
        text-anchor="middle"
        fill="#7ab87e"
        filter="url(#aTextGlow)"
        opacity="0.35">A</text>
  <text x="200" y="220"
        font-family="Georgia, serif"
        font-size="68"
        font-weight="bold"
        text-anchor="middle"
        fill="#ffffff"
        filter="url(#aTextGlow)">A</text>

</svg>
